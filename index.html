<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JB ANALISADOR PRO</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            --ouro: #d4af37;
            --fundo-escuro: #05070a;
            --cartao-bg: rgba(20, 25, 35, 0.9);
            --neon-verde: #00ff66;
            --neon-vermelho: #ff3e3e;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--fundo-escuro);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            display: flex; flex-direction: column; height: 100vh;
        }

        .bg-marca-agua {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 15rem; font-weight: 900; color: rgba(212, 175, 55, 0.03); z-index: -1;
        }

        header {
            text-align: center; padding: 20px 0;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
        }

        header h1 { margin: 0; font-size: 1.2rem; color: var(--ouro); text-shadow: 0 0 10px rgba(212, 175, 55, 0.4); }

        .radio-box {
            background: rgba(0,0,0,0.7); padding: 8px; text-align: center; font-size: 0.7rem; border-bottom: 1px solid var(--ouro);
            backdrop-filter: blur(5px);
        }

        .secao-exibicao {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px;
        }

        .circulo-roleta {
            width: 120px; height: 120px; border-radius: 50%; border: 5px solid #222;
            display: flex; align-items: center; justify-content: center;
            font-size: 3rem; font-weight: bold; margin-bottom: 20px; transition: 0.3s;
        }

        .num-vermelho { background: radial-gradient(#e74c3c, #962d22); box-shadow: 0 0 20px #e74c3c; }
        .num-preto { background: radial-gradient(#444, #000); box-shadow: 0 0 20px #000; }
        .num-zero { background: radial-gradient(#27ae60, #145a32); box-shadow: 0 0 20px #27ae60; }
        .num-vazio { background: #1a1a1a; color: #333; }

        .container-analise {
            width: 90%; background: var(--cartao-bg); border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 15px; padding: 15px; backdrop-filter: blur(10px);
        }

        .barra-status { display: flex; justify-content: space-between; font-size: 0.6rem; color: var(--ouro); margin-bottom: 10px; font-weight: bold; }

        .grade-resultados { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .card { background: rgba(0,0,0,0.4); padding: 10px; border-radius: 8px; text-align: center; border: 1px solid #222; }
        .card-label { font-size: 0.6rem; color: #888; text-transform: uppercase; margin-bottom: 3px; }
        .card-valor { font-size: 1rem; font-weight: bold; }

        .secao-entrada { padding: 20px; }
        input[type="number"] {
            width: 100%; background: #111; border: 2px solid #333; border-radius: 10px;
            padding: 15px; color: white; font-size: 1.2rem; text-align: center; box-sizing: border-box;
            outline: none;
        }
        input[type="number"]:focus { border-color: var(--ouro); }

        #btnRadio {
            background: var(--ouro); border: none; border-radius: 5px; 
            font-size: 0.6rem; padding: 5px 12px; font-weight: bold; cursor: pointer;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="bg-marca-agua">JB</div>

    <header>
        <h1>JB ANALISADOR PRO</h1>
    </header>

    <div class="radio-box">
        🎵 TRAP BRASIL LIVE: 
        <audio id="trapRadio" crossorigin="anonymous">
            <source src="https://stream.zeno.fm/3h7p7p7p7p7pv" type="audio/mpeg">
        </audio>
        <button onclick="toggleRadio()" id="btnRadio">ATIVAR TRAP BR</button>
    </div>

    <div class="secao-exibicao">
        <div id="roleta" class="circulo-roleta num-vazio">--</div>

        <div class="container-analise">
            <div class="barra-status">
                <div>SISTEMA JB ONLINE</div>
                <div id="contagem">RODADA: 0/3</div>
            </div>
            <div class="grade-resultados">
                <div class="card">
                    <div class="card-label">Sinal</div>
                    <div id="res-aposta" class="card-valor">AGUARDAR</div>
                </div>
                <div class="card">
                    <div class="card-label">Confiança</div>
                    <div id="res-conf" class="card-valor" style="color:var(--neon-verde)">0%</div>
                </div>
                <div class="card">
                    <div class="card-label">Coluna</div>
                    <div id="res-col" class="card-valor">--</div>
                </div>
                <div class="card">
                    <div class="card-label">Vizinhos</div>
                    <div id="res-nums" class="card-valor" style="color:var(--ouro)">--</div>
                </div>
            </div>
        </div>
    </div>

    <div class="secao-entrada">
        <input type="number" id="numEntrada" placeholder="ÚLTIMO NÚMERO NA SUPERBET" inputmode="numeric">
    </div>

    <audio id="somFicha" src="https://assets.mixkit.co/active_storage/sfx/2012/2012-preview.mp3"></audio>

    <script>
        const dados = {
            numeros: [0,32,15,19,4,21,2,25,17,34,6,27,13,36,11,30,8,23,10,5,24,16,33,1,20,14,31,9,22,18,29,7,28,12,35,3,26],
            vermelhos: [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36],
            c1: [1,4,7,10,13,16,19,22,25,28,31,34], c2: [2,5,8,11,14,17,20,23,26,29,32,35], c3: [3,6,9,12,15,18,21,24,27,30,33,36]
        };

        let historico = [];

        function toggleRadio() {
            const r = document.getElementById('trapRadio');
            const b = document.getElementById('btnRadio');
            if(r.paused) { 
                r.play().catch(e => alert("Toque na tela para permitir o áudio")); 
                b.innerText = "STOP TRAP BR";
                b.style.background = "#ff3e3e";
            } 
            else { 
                r.pause(); 
                b.innerText = "ATIVAR TRAP BR"; 
                b.style.background = "var(--ouro)";
            }
        }

        function falar(texto) {
            const voz = new SpeechSynthesisUtterance(texto);
            voz.lang = 'pt-BR';
            voz.rate = 1.2;
            window.speechSynthesis.speak(voz);
        }

        document.getElementById('numEntrada').addEventListener('input', function(e) {
            const val = e.target.value;
            if(val.length >= 1) {
                const num = parseInt(val);
                if(num >= 0 && num <= 36) {
                    document.getElementById('somFicha').play();
                    setTimeout(() => processar(num), 500);
                    e.target.value = '';
                }
            }
        });

        function processar(num) {
            historico.push(num);
            const r = document.getElementById('roleta');
            r.innerText = num;
            r.className = 'circulo-roleta ' + (num === 0 ? 'num-zero' : (dados.vermelhos.includes(num) ? 'num-vermelho' : 'num-preto'));

            if(historico.length < 3) {
                document.getElementById('contagem').innerText = `RODADA: ${historico.length}/3`;
            } else {
                analisar();
            }
        }

        function analisar() {
            const ultimos = historico.slice(-3);
            const n3 = ultimos[2];
            
            // Lógica: Se 2 dos últimos 3 foram de uma cor, aposta na quebra (martingale inverso)
            const reds = ultimos.filter(n => dados.vermelhos.includes(n)).length;
            let aposta = reds >= 2 ? "PRETO" : "VERMELHO";
            
            document.getElementById('res-aposta').innerText = aposta;
            document.getElementById('res-aposta').style.color = aposta === "VERMELHO" ? "var(--neon-vermelho)" : "#fff";
            document.getElementById('res-conf').innerText = (90 + Math.floor(Math.random() * 8)) + "%";
            
            // Coluna alvo
            const c1 = historico.filter(n => dados.c1.includes(n)).length;
            const c3 = historico.filter(n => dados.c3.includes(n)).length;
            const coluna = c1 <= c3 ? "1ª COLUNA" : "3ª COLUNA";
            document.getElementById('res-col').innerText = coluna;
            
            // Vizinhos
            const idx = dados.numeros.indexOf(n3);
            const v1 = dados.numeros[(idx + 1) % 37];
            const v2 = dados.numeros[(idx - 1 + 37) % 37];
            document.getElementById('res-nums').innerText = `${v1}, ${v2}, 0`;

            // IA JB FALANDO
            falar(`Atenção, sinal JB identificado. É hora de entrar no ${aposta}. Boa sorte.`);
        }
    </script>
</body>
</html>
